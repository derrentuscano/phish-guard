<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PhishGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }
    .header {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p  { font-size: 11px; opacity: 0.8; }
    .status-section { padding: 16px 20px; border-bottom: 1px solid #1e293b; }
    .status-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .status-connected { color: #10b981; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
    .status-disconnected { color: #f59e0b; font-weight: 600; font-size: 13px; }
    .user-email { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .section { padding: 16px 20px; }
    .section h3 { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; }
    .btn-danger  { background: #ef4444; color: white; margin-top: 8px; }
    .session-info { font-size: 12px; color: #94a3b8; margin-top: 10px; text-align: center; line-height: 1.5; }
    .footer { padding: 12px 20px; border-top: 1px solid #1e293b; text-align: center; font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🛡️ PhishGuard</h1>
      <p>Link Hover Preview</p>
    </div>
  </div>

  <div class="status-section">
    <div class="status-label">Account Status</div>
    <div id="status-display">
      <div class="status-disconnected">Not connected to PhishGuard</div>
    </div>
  </div>

  <div class="section">
    <h3>Connect Account</h3>
    <p class="session-info" id="info-text">
      Sign in on PhishGuard to sync your scan history across all devices.
    </p>
    <button class="btn btn-primary" id="open-site-btn">
      Open PhishGuard to Sign In
    </button>
    <button class="btn btn-danger" id="disconnect-btn" style="display:none">
      Disconnect Account
    </button>
  </div>

  <div class="footer">
    Extension active — hover any link to preview
  </div>

  <script src="popup.js"></script>
</body>
</html>
